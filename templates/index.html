<!DOCTYPE html>
<html>
<head>
    <title>Score Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f3c88, #1c2b4a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: #0b1a2f;
            padding: 45px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.7);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 25px;
        }

        input {
            width: 85%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            color: #00ffd5;
            font-weight: bold;
        }

        .info {
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
            color: #ccc;
        }

        .info h3 {
            text-align: center;
            color: white;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎓 Score Predictor</h1>
    <div class="subtitle">
        Predict scores based on study hours using Machine Learning
    </div>

    <form action="/predict" method="post">
        <input type="number" min="0" step="0.1" name="hours" placeholder="Enter study hours" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            📊 {{ prediction_text }}
        </div>
    {% endif %}

    <div class="info">
        <h3>How it Works</h3>
        <p>1. Enter study hours</p>
        <p>2. Model processes input</p>
        <p>3. Predicts score</p>
        <p>4. Displays result</p>
    </div>

    <div class="footer">
        Built with ❤️ using Flask & ML
    </div>

</div>

</body>
</html>
