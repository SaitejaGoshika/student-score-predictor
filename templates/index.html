<!DOCTYPE html>
<html>
<head>
    <title>Student Score Predictor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 400px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin: 15px 0;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background-color: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0072ff;
        }

        .result {
            margin-top: 15px;
            font-size: 20px;
            color: #00ffcc;
        }

        .info {
            margin-top: 25px;
            text-align: left;
            font-size: 14px;
        }

        .info h3 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 Score Predictor</h1>

    <form action="/predict" method="post">
        <input type="number" step="0.1" name="hours" placeholder="Enter study hours" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

    <div class="info">
        <h3>How it Works</h3>
        <p>1. Enter number of study hours</p>
        <p>2. Model analyzes input</p>
        <p>3. Predicts score using trained ML model</p>
        <p>4. Displays estimated result</p>
    </div>
</div>

</body>
</html>
